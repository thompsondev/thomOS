<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>thomOS – Command Center</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #08080b;
        --surface: #0f0f13;
        --surface-2: #16161c;
        --border: rgba(255, 255, 255, 0.06);
        --border-hi: rgba(255, 255, 255, 0.1);
        --text: #ededf3;
        --text-2: #787893;
        --text-3: #4a4a62;
        --accent: #ededf3;
        --teal: #22d3ee;
        --green: #4ade80;
        --amber: #fbbf24;
        --red: #f87171;
        --violet: #a78bfa;
        --ui: 'Syne', system-ui, sans-serif;
        --mono: 'IBM Plex Mono', monospace;
        --r: 14px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--ui);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        background-image:
          radial-gradient(
            ellipse 80% 50% at 10% -10%,
            rgba(34, 211, 238, 0.08),
            transparent
          ),
          radial-gradient(
            ellipse 60% 40% at 90% 0%,
            rgba(167, 139, 250, 0.06),
            transparent
          );
      }

      button,
      input {
        font: inherit;
        color: inherit;
      }

      .hidden {
        display: none !important;
      }

      /* —— Login —— */
      #login-view {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .login-card {
        width: min(400px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 36px 32px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      .login-card h1 {
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        margin-bottom: 6px;
      }

      .login-card .sub {
        color: var(--text-2);
        font-size: 0.9rem;
        margin-bottom: 28px;
        font-family: var(--mono);
        font-size: 0.78rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }

      .field label {
        font-size: 0.75rem;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-family: var(--mono);
      }

      .field input {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px 14px;
        outline: none;
      }

      .field input:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.12);
      }

      .btn {
        border: none;
        border-radius: 10px;
        padding: 12px 18px;
        cursor: pointer;
        font-weight: 600;
        transition:
          transform 0.15s,
          opacity 0.15s,
          background 0.15s;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-primary {
        background: var(--text);
        color: var(--bg);
        width: 100%;
        margin-top: 8px;
      }

      .btn-primary:hover:not(:disabled) {
        opacity: 0.9;
      }

      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border-hi);
        color: var(--text-2);
      }

      .btn-ghost:hover:not(:disabled) {
        color: var(--text);
        border-color: var(--text-3);
      }

      .btn-teal {
        background: rgba(34, 211, 238, 0.12);
        color: var(--teal);
        border: 1px solid rgba(34, 211, 238, 0.25);
      }

      .btn-teal:hover:not(:disabled) {
        background: rgba(34, 211, 238, 0.2);
      }

      .error-banner {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.25);
        color: var(--red);
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 0.85rem;
        margin-bottom: 16px;
      }

      /* —— App shell —— */
      #app-view {
        max-width: 1180px;
        margin: 0 auto;
        padding: 28px 24px 64px;
      }

      header.app-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 32px;
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .brand h1 {
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .brand p {
        color: var(--text-2);
        font-family: var(--mono);
        font-size: 0.78rem;
      }

      .header-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      /* —— Stats —— */
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 12px;
        margin-bottom: 28px;
      }

      .stat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 18px 16px;
        position: relative;
        overflow: hidden;
      }

      .stat::after {
        content: '';
        position: absolute;
        inset: auto 0 0 0;
        height: 2px;
        background: var(--stat-accent, var(--text-3));
        opacity: 0.7;
      }

      .stat .label {
        font-family: var(--mono);
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-3);
        margin-bottom: 10px;
      }

      .stat .value {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1;
      }

      .stat[data-k='jobsFoundToday'] {
        --stat-accent: var(--teal);
      }
      .stat[data-k='applied'] {
        --stat-accent: var(--green);
      }
      .stat[data-k='waiting'] {
        --stat-accent: var(--amber);
      }
      .stat[data-k='interview'] {
        --stat-accent: var(--violet);
      }
      .stat[data-k='rejected'] {
        --stat-accent: var(--red);
      }
      .stat[data-k='offer'] {
        --stat-accent: var(--green);
      }

      /* —— Panels —— */
      .grid-2 {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 16px;
      }

      @media (max-width: 900px) {
        .grid-2 {
          grid-template-columns: 1fr;
        }
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 18px;
        border-bottom: 1px solid var(--border);
      }

      .panel-head h2 {
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .panel-head .count {
        font-family: var(--mono);
        font-size: 0.72rem;
        color: var(--text-3);
      }

      .list {
        max-height: 480px;
        overflow: auto;
      }

      .row {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        display: grid;
        gap: 4px;
      }

      .row:last-child {
        border-bottom: none;
      }

      .row:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      .row .title {
        font-weight: 600;
        font-size: 0.92rem;
      }

      .row .meta {
        font-family: var(--mono);
        font-size: 0.72rem;
        color: var(--text-2);
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-family: var(--mono);
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        border: 1px solid var(--border-hi);
        color: var(--text-2);
      }

      .badge.found {
        color: var(--teal);
        border-color: rgba(34, 211, 238, 0.3);
      }
      .badge.applied,
      .badge.offer {
        color: var(--green);
        border-color: rgba(74, 222, 128, 0.3);
      }
      .badge.waiting {
        color: var(--amber);
        border-color: rgba(251, 191, 36, 0.3);
      }
      .badge.interview {
        color: var(--violet);
        border-color: rgba(167, 139, 250, 0.3);
      }
      .badge.rejected {
        color: var(--red);
        border-color: rgba(248, 113, 113, 0.3);
      }

      .score {
        color: var(--teal);
        font-weight: 500;
      }

      .empty {
        padding: 36px 18px;
        text-align: center;
        color: var(--text-3);
        font-family: var(--mono);
        font-size: 0.8rem;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--surface-2);
        border: 1px solid var(--border-hi);
        padding: 12px 16px;
        border-radius: 12px;
        font-size: 0.85rem;
        max-width: 360px;
        z-index: 50;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 0.2s,
          transform 0.2s;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast.err {
        border-color: rgba(248, 113, 113, 0.35);
        color: var(--red);
      }

      a.link {
        color: var(--teal);
        text-decoration: none;
        font-size: 0.8rem;
      }

      a.link:hover {
        text-decoration: underline;
      }

      .profile-chip {
        font-family: var(--mono);
        font-size: 0.72rem;
        color: var(--text-2);
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
      }
    </style>
  </head>
  <body>
    <div id="login-view">
      <div class="login-card">
        <h1>thomOS</h1>
        <p class="sub">Job agent command center</p>
        <div id="login-error" class="error-banner hidden"></div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary" id="login-btn" type="button">
          Sign in
        </button>
      </div>
    </div>

    <div id="app-view" class="hidden">
      <header class="app-header">
        <div class="brand">
          <h1>Command Center</h1>
          <p id="user-line">Loading…</p>
        </div>
        <div class="header-actions">
          <span class="profile-chip" id="profile-chip">—</span>
          <button class="btn btn-teal" id="discover-btn" type="button">
            Discover jobs
          </button>
          <button class="btn btn-ghost" id="refresh-btn" type="button">
            Refresh
          </button>
          <a class="btn btn-ghost link" href="/" style="padding: 12px 18px"
            >Chat</a
          >
          <button class="btn btn-ghost" id="logout-btn" type="button">
            Log out
          </button>
        </div>
      </header>

      <section class="stats" id="stats">
        <div class="stat" data-k="jobsFoundToday">
          <div class="label">Jobs found today</div>
          <div class="value" data-v>—</div>
        </div>
        <div class="stat" data-k="applied">
          <div class="label">Applied</div>
          <div class="value" data-v>—</div>
        </div>
        <div class="stat" data-k="waiting">
          <div class="label">Waiting</div>
          <div class="value" data-v>—</div>
        </div>
        <div class="stat" data-k="interview">
          <div class="label">Interview</div>
          <div class="value" data-v>—</div>
        </div>
        <div class="stat" data-k="rejected">
          <div class="label">Rejected</div>
          <div class="value" data-v>—</div>
        </div>
        <div class="stat" data-k="offer">
          <div class="label">Offer</div>
          <div class="value" data-v>—</div>
        </div>
      </section>

      <div class="grid-2">
        <section class="panel">
          <div class="panel-head">
            <h2>Jobs</h2>
            <span class="count" id="jobs-count">0</span>
          </div>
          <div class="list" id="jobs-list">
            <div class="empty">No jobs yet. Run discovery.</div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Applications</h2>
            <span class="count" id="apps-count">0</span>
          </div>
          <div class="list" id="apps-list">
            <div class="empty">No applications yet.</div>
          </div>
        </section>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const API = '/v1';
      const TOKEN_KEY = 'thomos_token';
      const USER_KEY = 'thomos_user';

      const $ = (id) => document.getElementById(id);

      function token() {
        return localStorage.getItem(TOKEN_KEY);
      }

      function setSession(accessToken, user) {
        localStorage.setItem(TOKEN_KEY, accessToken);
        localStorage.setItem(USER_KEY, JSON.stringify(user));
      }

      function clearSession() {
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem(USER_KEY);
      }

      function toast(msg, isErr) {
        const el = $('toast');
        el.textContent = msg;
        el.classList.toggle('err', !!isErr);
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3200);
      }

      async function api(path, options = {}) {
        const headers = {
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        };
        const t = token();
        if (t) headers.Authorization = `Bearer ${t}`;

        const res = await fetch(`${API}${path}`, { ...options, headers });
        if (res.status === 401) {
          clearSession();
          showLogin();
          throw new Error('Session expired. Sign in again.');
        }
        const text = await res.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch {
          data = text;
        }
        if (!res.ok) {
          const msg =
            (data && (data.message || data.error)) ||
            `Request failed (${res.status})`;
          throw new Error(Array.isArray(msg) ? msg.join(', ') : msg);
        }
        return data;
      }

      function showLogin() {
        $('login-view').classList.remove('hidden');
        $('app-view').classList.add('hidden');
      }

      function showApp() {
        $('login-view').classList.add('hidden');
        $('app-view').classList.remove('hidden');
      }

      async function login() {
        const email = $('email').value.trim();
        const password = $('password').value;
        const err = $('login-error');
        err.classList.add('hidden');
        $('login-btn').disabled = true;
        try {
          const data = await api('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password }),
          });
          setSession(data.accessToken, data.user);
          await bootApp();
        } catch (e) {
          err.textContent = e.message;
          err.classList.remove('hidden');
        } finally {
          $('login-btn').disabled = false;
        }
      }

      function renderStats(dash) {
        for (const el of document.querySelectorAll('.stat')) {
          const k = el.dataset.k;
          const v = dash?.[k];
          el.querySelector('[data-v]').textContent =
            typeof v === 'number' ? v : '—';
        }
      }

      function jobRow(job) {
        const score =
          job.matchScore != null
            ? `<span class="score">${Math.round(job.matchScore)}% match</span>`
            : '';
        const link = job.sourceUrl
          ? `<a class="link" href="${escapeAttr(job.sourceUrl)}" target="_blank" rel="noopener">Open listing</a>`
          : '';
        return `<div class="row">
          <div class="title">${escapeHtml(job.title)}</div>
          <div class="meta">
            <span>${escapeHtml(job.company)}</span>
            <span>${job.remote ? 'Remote' : escapeHtml(job.location || '—')}</span>
            <span>${escapeHtml(job.source || 'manual')}</span>
            ${score}
            ${link}
          </div>
        </div>`;
      }

      function appRow(app, jobsById) {
        const job = jobsById.get(app.jobId);
        const title = job
          ? `${job.title} · ${job.company}`
          : `Application ${app.id.slice(0, 8)}`;
        const score =
          app.matchScore != null
            ? `<span class="score">${Math.round(app.matchScore)}%</span>`
            : '';
        return `<div class="row">
          <div class="title">${escapeHtml(title)}</div>
          <div class="meta">
            <span class="badge ${escapeAttr(app.status)}">${escapeHtml(app.status)}</span>
            ${score}
            <span>${app.autoSubmitApproved ? 'submit approved' : 'needs approval'}</span>
          </div>
        </div>`;
      }

      function escapeHtml(s) {
        return String(s ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function escapeAttr(s) {
        return escapeHtml(s).replace(/'/g, '&#39;');
      }

      async function refresh() {
        const [dash, jobs, apps, profile, me] = await Promise.all([
          api('/applications/dashboard'),
          api('/jobs'),
          api('/applications'),
          api('/profile/me'),
          api('/auth/me'),
        ]);

        renderStats(dash);

        const jobsList = Array.isArray(jobs) ? jobs : [];
        const appsList = Array.isArray(apps) ? apps : [];
        const jobsById = new Map(jobsList.map((j) => [j.id, j]));

        $('jobs-count').textContent = String(jobsList.length);
        $('apps-count').textContent = String(appsList.length);

        $('jobs-list').innerHTML = jobsList.length
          ? jobsList.map(jobRow).join('')
          : '<div class="empty">No jobs yet. Run discovery.</div>';

        $('apps-list').innerHTML = appsList.length
          ? appsList.map((a) => appRow(a, jobsById)).join('')
          : '<div class="empty">No applications yet.</div>';

        $('user-line').textContent = me.email;
        $('profile-chip').textContent =
          profile.headline || profile.fullName || 'Profile loaded';
      }

      async function discover() {
        const btn = $('discover-btn');
        btn.disabled = true;
        btn.textContent = 'Discovering…';
        try {
          const result = await api('/agents/pipeline/discover', {
            method: 'POST',
            body: JSON.stringify({
              query: 'Senior Frontend React TypeScript',
              limit: 5,
            }),
          });
          const disc = (result.steps || []).find((s) => s.agentId === 'discovery');
          const saved = disc?.data?.jobIds?.length ?? 0;
          toast(
            disc?.success
              ? `Discovery done — ${saved} new job(s) saved`
              : disc?.error || 'Discovery finished',
            !disc?.success,
          );
          await refresh();
        } catch (e) {
          toast(e.message, true);
        } finally {
          btn.disabled = false;
          btn.textContent = 'Discover jobs';
        }
      }

      async function bootApp() {
        showApp();
        try {
          await refresh();
        } catch (e) {
          toast(e.message, true);
          clearSession();
          showLogin();
        }
      }

      $('login-btn').addEventListener('click', login);
      $('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') login();
      });
      $('logout-btn').addEventListener('click', () => {
        clearSession();
        showLogin();
      });
      $('refresh-btn').addEventListener('click', async () => {
        try {
          await refresh();
          toast('Refreshed');
        } catch (e) {
          toast(e.message, true);
        }
      });
      $('discover-btn').addEventListener('click', discover);

      if (token()) bootApp();
      else showLogin();
    </script>
  </body>
</html>
